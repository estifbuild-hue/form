<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formspree Test</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: #f4f2ee;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px 24px;
}

.card {
  background: #fff;
  border: 1px solid #e8e7e2;
  border-radius: 14px;
  padding: 48px 40px;
  max-width: 520px;
  width: 100%;
}

h2 {
  font-size: 22px;
  font-weight: 700;
  color: #111;
  margin-bottom: 8px;
}

p {
  font-size: 14px;
  color: #6b6a67;
  margin-bottom: 32px;
  line-height: 1.7;
}

.field {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-bottom: 16px;
}

label {
  font-size: 12px;
  font-weight: 500;
  color: #6b6a67;
}

input, select, textarea {
  background: #f4f2ee;
  border: 1px solid #e8e7e2;
  border-radius: 8px;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  color: #111;
  padding: 11px 14px;
  outline: none;
  appearance: none;
  transition: border-color 0.2s;
}

input:focus, select:focus, textarea:focus {
  border-color: #d4581e;
}

select option { background: #fff; }
textarea { resize: none; height: 90px; }

button {
  width: 100%;
  background: #d4581e;
  color: #fff;
  border: none;
  border-radius: 8px;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 500;
  padding: 14px;
  cursor: pointer;
  margin-top: 8px;
  transition: background 0.2s;
}

button:hover { background: #bf4e18; }

.success {
  display: none;
  text-align: center;
  padding: 32px 0 8px;
}

.success h3 {
  font-size: 18px;
  font-weight: 700;
  color: #111;
  margin-bottom: 8px;
}

.success p {
  font-size: 14px;
  color: #6b6a67;
  margin: 0;
}
</style>
</head>
<body>

<div class="card">
  <h2>Are you a good fit?</h2>
  <p>Answer a few quick questions and we will get back to you within 24 hours.</p>

  <form id="form" action="https://formspree.io/f/meenlnjo" method="POST">
    <div class="field">
      <label>Your name</label>
      <input type="text" name="name" placeholder="Alex Johnson" required>
    </div>
    <div class="field">
      <label>Email address</label>
      <input type="email" name="email" placeholder="alex@company.com" required>
    </div>
    <div class="field">
      <label>What is your monthly ad budget?</label>
      <select name="budget" required>
        <option value="" disabled selected>Choose one</option>
        <option>Less than $500</option>
        <option>$500 to $2,000</option>
        <option>$2,000 to $5,000</option>
        <option>More than $5,000</option>
      </select>
    </div>
    <div class="field">
      <label>What is your biggest challenge right now?</label>
      <select name="challenge" required>
        <option value="" disabled selected>Choose one</option>
        <option>Not enough leads coming in</option>
        <option>Leads not converting to clients</option>
        <option>Inconsistent revenue month to month</option>
        <option>Stuck relying on referrals</option>
      </select>
    </div>
    <div class="field">
      <label>How soon are you looking to start?</label>
      <select name="timeline" required>
        <option value="" disabled selected>Choose one</option>
        <option>Immediately</option>
        <option>Within 2 weeks</option>
        <option>Within a month</option>
        <option>Just exploring for now</option>
      </select>
    </div>
    <div class="field">
      <label>Anything else we should know?</label>
      <textarea name="message" placeholder="Tell us about your business..."></textarea>
    </div>
    <button type="submit">Submit Application</button>
  </form>

  <div class="success" id="success">
    <h3>Application received</h3>
    <p>We will review your answers and get back to you within 24 hours.</p>
  </div>
</div>

<script>
const form = document.getElementById('form');
const success = document.getElementById('success');

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  const data = new FormData(form);
  const res = await fetch(form.action, {
    method: 'POST',
    body: data,
    headers: { 'Accept': 'application/json' }
  });
  if (res.ok) {
    form.style.display = 'none';
    success.style.display = 'block';
  }
});
</script>

</body>
</html>
